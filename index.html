<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Our Telegram Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tg: #29A8E8;
      --tg-dark: #1a7ab5;
      --bg: #0a0e1a;
      --surface: #111828;
      --surface2: #1a2236;
      --text: #e8f0fe;
      --muted: #7a90b8;
      --glow: rgba(41,168,232,0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BG GRID ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(41,168,232,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(41,168,232,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── BLOBS ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .25;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #29A8E8; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: #1a4f9e; bottom: -80px; right: -80px; animation-delay: -6s; }
    .blob-3 { width: 300px; height: 300px; background: #0d3b72; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -3s; }

    @keyframes drift { from { transform: translateY(0) scale(1); } to { transform: translateY(40px) scale(1.08); } }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 0;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      background: rgba(17,24,40,.75);
      border: 1px solid rgba(41,168,232,.2);
      border-radius: 28px;
      padding: 56px 48px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 60px rgba(41,168,232,.08), 0 40px 80px rgba(0,0,0,.4);
      animation: fadeUp .8s cubic-bezier(.16,1,.3,1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(41,168,232,.35), transparent 60%);
      z-index: -1;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(32px); } to { opacity:1; transform:translateY(0); } }

    /* ── ICON ── */
    .tg-icon-wrap {
      position: relative;
      width: 96px; height: 96px;
      margin: 0 auto 28px;
    }

    .tg-icon-wrap .ring {
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(41,168,232,.3);
      animation: spin 8s linear infinite;
    }
    .tg-icon-wrap .ring::after {
      content: '';
      position: absolute;
      top: -3px; left: 50%;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--tg);
      transform: translateX(-50%);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .tg-icon {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #29A8E8, #1a6fae);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 32px rgba(41,168,232,.5);
    }

    .tg-icon svg { width: 52px; height: 52px; }

    /* ── BADGE ── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(41,168,232,.12);
      border: 1px solid rgba(41,168,232,.3);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--tg);
      letter-spacing: .08em;
      margin-bottom: 20px;
      animation: fadeUp .8s .15s cubic-bezier(.16,1,.3,1) both;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--tg);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    /* ── TEXT ── */
    h1 {
      font-size: clamp(26px, 5vw, 34px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.02em;
      margin-bottom: 12px;
      animation: fadeUp .8s .2s cubic-bezier(.16,1,.3,1) both;
    }

    h1 span {
      background: linear-gradient(90deg, #29A8E8, #7dd8fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      margin-bottom: 36px;
      animation: fadeUp .8s .28s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 36px;
      animation: fadeUp .8s .35s cubic-bezier(.16,1,.3,1) both;
    }

    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 14px 8px;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--tg);
      font-family: 'Space Mono', monospace;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(41,168,232,.25), transparent);
      margin: 0 0 32px;
      animation: fadeUp .8s .4s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── BUTTON ── */
    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 28px;
      background: linear-gradient(135deg, #29A8E8, #1a7ab5);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform .18s, box-shadow .18s;
      box-shadow: 0 8px 32px rgba(41,168,232,.4);
      animation: fadeUp .8s .45s cubic-bezier(.16,1,.3,1) both;
    }

    .join-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transition: left .5s;
    }

    .join-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(41,168,232,.55); }
    .join-btn:hover::before { left: 160%; }
    .join-btn:active { transform: translateY(0); }

    .join-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(122,144,184,.5);
      font-family: 'Space Mono', monospace;
      letter-spacing: .06em;
      animation: fadeUp .8s .55s cubic-bezier(.16,1,.3,1) both;
    }

    .footer span { color: rgba(41,168,232,.6); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <main class="page">
    <div class="card">

      <!-- Icon -->
      <div class="tg-icon-wrap">
        <div class="ring"></div>
        <div class="tg-icon">
          <!-- Telegram Paper-plane SVG -->
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.5 23.5L18.5 28.5L23.5 42.5L31.5 33L41.5 8L5.5 23.5Z" fill="white" opacity=".9"/>
            <path d="M18.5 28.5L31.5 33L41.5 8L18.5 28.5Z" fill="white" opacity=".6"/>
          </svg>
        </div>
      </div>

      <!-- Badge -->
      <div class="live-badge">
        <span class="live-dot"></span>
        ACTIVE COMMUNITY
      </div>

      <!-- Title -->
      <h1>Join Our <span>Best Friend</span><br/>on Telegram</h1>

      <p class="desc">
        ចូលរួមជាមួយសហគមន៍ best friend របស់យើង។<br/>
        ស្វែករកមិត្តថ្មី · ចែករំលែក · សប្បាយ 😎
      </p>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-num">Free</div>
          <div class="stat-label">Join</div>
        </div>
        <div class="stat">
          <div class="stat-num">24/7</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat">
          <div class="stat-num">100%</div>
          <div class="stat-label">Chill Chill</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- CTA -->
      <a class="join-btn" href="https://t.me/chillchill16899" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.83-1.09.52l-3-2.21-1.45 1.39c-.16.16-.29.29-.6.29l.21-3.02 5.49-4.96c.24-.21-.05-.33-.37-.12l-6.78 4.27-2.92-.91c-.63-.2-.65-.63.13-.94l11.39-4.39c.53-.19.99.13.81.56z"/>
        </svg>
        Join Group Now
      </a>

      <!-- Footer -->
      <p class="footer">Created by <span>Jerry</span> · Powered by Telegram</p>

    </div>
  </main>

</body>
</html>
